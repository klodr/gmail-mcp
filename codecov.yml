coverage:
  status:
    project:
      default:
        # Re-tightened by PR #7 of the v1.0.0 migration. The legacy
        # `CallToolRequestSchema` switch dispatcher in `src/index.ts`
        # was deleted; every tool now lives in `src/tools/*.ts` with
        # direct unit-test coverage via the `defineTool` →
        # InMemoryTransport E2E pattern. Global coverage now sits
        # around 80%+ — restoring `auto` so subsequent PRs are gated
        # against the actual baseline rather than an arbitrary floor.
        target: auto
        threshold: 0.5%
        only_pulls: false
    patch:
      default:
        # Restored to the pre-relaxation 95% target. New code in a PR
        # must be well-covered; the 1.5% threshold absorbs the noise
        # of a defensive branch or two without flagging.
        target: 95%
        threshold: 1.5%
        only_pulls: false
  ignore:
    # Doc-only / config-only PRs never touch these paths.
    - "**/*.md"
    - "**/*.yaml"
    - "**/*.yml"
    - "**/*.json"
    - ".github/**"
    - "scripts/**"
    # `src/index.ts` is now a thin entry point: `loadCredentials` +
    # `authenticate` (CLI auth flow only) + `main()` that builds the
    # gmail client and hands off to `createServer`. The OAuth callback
    # path runs only during `npx … auth` (interactive flow); the
    # Gmail-credentials-not-configured error paths are tested via
    # `gmail-errors.test.ts` and `lazy-boot.test.ts`. The remaining
    # uncovered surface is the `getAccessToken` startup probe and
    # the bootstrap glue, which is exercised via integration runs.
    #
    # `tools.ts` and `tools-coercion.ts` carry the long Zod schema
    # definitions + the tool registry array; the schemas themselves
    # are exercised through the registrar tests, but the descriptive
    # prose attached via `.describe()` is not "executed" in the
    # coverage sense.
    - "src/index.ts"

comment:
  layout: "reach,diff,flags,files,footer"
  behavior: default
  require_changes: false
