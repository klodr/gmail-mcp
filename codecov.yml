coverage:
  status:
    project:
      default:
        # Re-tightened by PR #7 of the v1.0.0 migration. The legacy
        # `CallToolRequestSchema` switch dispatcher in `src/index.ts`
        # was deleted; every tool now lives in `src/tools/*.ts` with
        # direct unit-test coverage via the `defineTool` →
        # InMemoryTransport E2E pattern. Global coverage now sits
        # around 80%+ — restoring `auto` so subsequent PRs are gated
        # against the actual baseline rather than an arbitrary floor.
        target: auto
        threshold: 0.5%
        only_pulls: false
    patch:
      default:
        # Restored to the pre-relaxation 95% target. New code in a PR
        # must be well-covered; the 1.5% threshold absorbs the noise
        # of a defensive branch or two without flagging.
        target: 95%
        threshold: 1.5%
        only_pulls: false
  ignore:
    # Doc-only / config-only PRs never touch these paths.
    - "**/*.md"
    - "**/*.yaml"
    - "**/*.yml"
    - "**/*.json"
    - ".github/**"
    - "scripts/**"
    # `src/index.ts` is the thin CLI entry point. The OAuth flow
    # (`loadCredentials` + `authenticate`) was extracted into
    # `src/oauth-flow.ts` so it could be unit-tested without invoking
    # `main()` on import — `oauth-flow.test.ts` now covers the
    # lazy-boot path, the `installed`/`web` keys variants, the legacy
    # vs v1.2.0+ credentials shape, the cwd-keys-copy + 0o600 chmod,
    # the invalid-keys exit, and the authenticate() URL/port/listen
    # rejection branches at ~92% statements.
    #
    # What remains in `src/index.ts` is bootstrap-only: argv parsing
    # (callback URL + `--scopes`), `GMAIL_MCP_TIMEOUT_MS` parsing,
    # the `google.options` + `google.gmail` + `createServer` +
    # `transport.connect` glue, and the fire-and-forget
    # `getAccessToken` startup probe. None of those are reachable
    # without invoking `main()` (which boots a real stdio server),
    # so they stay ignored until a future `runServer()` extraction
    # makes them testable.
    #
    # `tools.ts` and `tools-coercion.ts` carry the long Zod schema
    # definitions + the tool registry array; the schemas themselves
    # are exercised through the registrar tests, but the descriptive
    # prose attached via `.describe()` is not "executed" in the
    # coverage sense.
    - "src/index.ts"

comment:
  layout: "reach,diff,flags,files,footer"
  behavior: default
  require_changes: false
